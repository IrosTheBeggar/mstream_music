name: Release

# Tag-driven release pipeline. Pushing a tag like `v0.15.0`:
#   1. builds the `full` APK (sideload) + the `play` AAB,
#   2. creates a GitHub Release with both attached,
#   3. uploads the AAB to Google Play's `internal` track — but ONLY once the
#      PLAY_SERVICE_ACCOUNT_JSON secret is set (otherwise that step is skipped,
#      so the GitHub Release still publishes regardless),
#   4. builds an UNSIGNED iOS .ipa on a macOS runner and appends it to the
#      same release (build-ios-unsigned job below) — for sideloaders
#      (AltStore/SideStore re-sign on install) and as CI proof the iOS
#      target builds from a clean checkout. App Store / TestFlight uploads
#      stay a local step (flutter build ipa + Transporter): automating them
#      here needs a distribution cert (.p12), an App Store provisioning
#      profile, and an App Store Connect API key wired up as secrets —
#      worth doing once release cadence justifies the setup ritual.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64    base64-encoded contents of the .jks file
#   ANDROID_KEYSTORE_PASSWORD  storePassword from android/key.properties
#   ANDROID_KEY_PASSWORD       keyPassword from android/key.properties
#   ANDROID_KEY_ALIAS          keyAlias from android/key.properties (currently "key")
#   PLAY_SERVICE_ACCOUNT_JSON  (optional) Google Play service-account JSON key
#                              with Release-manager access to mstream.music.
#                              Until it's set, the Play-upload step is skipped.
#
# Play prerequisites (one-time, manual): create the app `mstream.music` in
# the Play Console, do the FIRST AAB upload by hand (Google requires it for a
# brand-new app), enable Play App Signing, and grant the service account access.

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed for softprops/action-gh-release to create the release
    env:
      # Surfaced as an env var so the Play-upload step can guard on its presence
      # (secrets.* can't be referenced directly in a step `if:`).
      PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        # Matches sourceCompatibility VERSION_17 in android/app/build.gradle.
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        # Pinned to the project's working version per TEST_PLAN.md
        # rather than channel:stable, so a Flutter release on the
        # same day doesn't surprise us mid-release-cut.
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          cache: true

      - name: Restore keystore from secret
        # The keystore is a 2 KB binary; base64-encoding is the
        # standard way to round-trip it through a GitHub Secret. It
        # never appears in plaintext on disk before this step, and
        # the runner is destroyed at the end of the job.
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks

      - name: Generate android/key.properties
        # storeFile is resolved by gradle's file() from
        # android/app/build.gradle's project directory (android/app/),
        # so a bare filename here points at upload-keystore.jks
        # alongside build.gradle — the same one we just decoded.
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Install Dart dependencies
        # Also writes android/local.properties (gitignored) with
        # flutter.versionCode / flutter.versionName extracted from
        # pubspec.yaml's `version:` field — gradle reads those.
        run: flutter pub get

      - name: Build signed artifacts (full APK for sideload + Play AAB)
        # Two product flavors (see android/app/build.gradle): `play` is the
        # Google-Play-compliant build (canonical applicationId mstream.music, no
        # MANAGE_EXTERNAL_STORAGE); `full` is the mStream Plus sideload build
        # (mstream.music.plus, All-files-access). VARIANT=play gates the UI.
        run: |
          flutter build apk --release --flavor full
          flutter build appbundle --release --flavor play --dart-define=VARIANT=play

      - name: Verify iroh tunnel .so is bundled
        # The iroh remote-access transport ships as a prebuilt JNI lib committed under
        # android/app/src/main/jniLibs/<abi>/libiroh_tunnel.so (same model as
        # libprojectM — this runner has no Rust/NDK toolchain). Fail loudly if it is
        # missing from the built artifacts, so a dropped/forgotten .so can't silently
        # ship a release with no remote access. Rebuild + recommit via
        # rust/iroh_tunnel/build-android.sh when the Rust shim changes.
        run: |
          set -euo pipefail
          apk=build/app/outputs/flutter-apk/app-full-release.apk
          aab=build/app/outputs/bundle/playRelease/app-play-release.aab
          for abi in arm64-v8a x86_64; do
            unzip -l "$apk" | grep -q "lib/$abi/libiroh_tunnel.so" \
              || { echo "::error::libiroh_tunnel.so missing from full APK ($abi)"; exit 1; }
          done
          for abi in arm64-v8a x86_64; do
            unzip -l "$aab" | grep -q "lib/$abi/libiroh_tunnel.so" \
              || { echo "::error::libiroh_tunnel.so missing from play AAB ($abi)"; exit 1; }
          done
          # armeabi-v7a is shipped on purpose for 32-bit-ARM device coverage (Google
          # Play counts it toward supported devices), but it must NOT carry our native
          # libs — those are built for arm64-v8a + x86_64 only and the runtime guards
          # handle their absence. Assert the slice is present AND lib-free, so we catch
          # both "lost 32-bit device support again" and "a 32-bit .so leaked in".
          for art in "$apk" "$aab"; do
            unzip -l "$art" | grep -q "lib/armeabi-v7a/" \
              || { echo "::error::$art is missing armeabi-v7a — 32-bit ARM device support dropped"; exit 1; }
            if unzip -l "$art" | grep -qE "lib/armeabi-v7a/(libiroh_tunnel|libprojectM-4|libvisualizer_bridge)\.so"; then
              echo "::error::$art ships native libs under armeabi-v7a — they aren't built for 32-bit ARM"; exit 1
            fi
          done
          echo "OK: libiroh_tunnel.so on arm64-v8a + x86_64; armeabi-v7a present (lib-free) for 32-bit device coverage"

      - name: Rename artifacts to include tag
        # Flutter names flavored outputs app-<flavor>-<buildtype>.{apk,aab}.
        # Rename so multiple releases disambiguate locally.
        run: |
          mv build/app/outputs/flutter-apk/app-full-release.apk \
             build/app/outputs/flutter-apk/mstream_music-${{ github.ref_name }}.apk
          mv build/app/outputs/bundle/playRelease/app-play-release.aab \
             build/app/outputs/bundle/playRelease/mstream_music-play-${{ github.ref_name }}.aab

      - name: Create GitHub Release and attach artifacts
        # The .apk is the sideload build; the .aab is the Play upload bundle
        # (not directly installable — upload it to the Play Console).
        # generate_release_notes auto-builds the body from PRs/commits since the
        # previous tag.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            build/app/outputs/flutter-apk/mstream_music-*.apk
            build/app/outputs/bundle/playRelease/mstream_music-play-*.aab

      - name: Upload AAB to Google Play (internal track)
        # Skipped until PLAY_SERVICE_ACCOUNT_JSON is configured, so a release
        # never fails just because Play isn't wired up yet. `internal` track +
        # status: completed = the build auto-lands in internal testing; promote
        # to production from the console. Change track/status here for
        # closed/open/production or a manual `draft` rollout. (The app uses no
        # R8/mapping — minifyEnabled is false — so no mappingFile is uploaded.)
        if: env.PLAY_SERVICE_ACCOUNT_JSON != ''
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: mstream.music
          releaseFiles: build/app/outputs/bundle/playRelease/mstream_music-play-${{ github.ref_name }}.aab
          track: internal
          status: completed

  build-ios-unsigned:
    # Appends the UNSIGNED iOS .ipa to the release the Android job created
    # (`needs` guarantees the release exists — softprops upserts by tag, so
    # this append can't race the creation). Unsigned because signing secrets
    # aren't wired up (see header); sideloaders re-sign on install anyway.
    # Like the Android job, this runner has no Rust toolchain: the native
    # transports ship as COMMITTED xcframeworks.
    runs-on: macos-15
    needs: build-and-release
    permissions:
      contents: write   # append the .ipa to the release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select newest stable Xcode
        # Flutter 3.44 needs a current Xcode; the runner image ships several
        # side by side and the default can lag.
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Flutter
        # Same pin as the Android job — see the comment there.
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          cache: true

      - name: Build iOS (release, unsigned)
        run: |
          flutter pub get
          flutter build ios --release --no-codesign

      - name: Verify native frameworks + privacy manifest are bundled
        # Same spirit as the Android job's jniLibs check: fail loudly if a
        # committed xcframework vanished from the bundle (a dropped framework
        # would ship a release with no remote access / no visualizer audio),
        # or if the App-Store-required privacy manifest went missing.
        run: |
          set -euo pipefail
          app=build/ios/iphoneos/Runner.app
          for fw in iroh_tunnel viz_decoder; do
            [ -f "$app/Frameworks/$fw.framework/$fw" ] \
              || { echo "::error::$fw.framework missing from Runner.app"; exit 1; }
          done
          [ -f "$app/PrivacyInfo.xcprivacy" ] \
            || { echo "::error::PrivacyInfo.xcprivacy missing from Runner.app"; exit 1; }
          echo "OK: iroh_tunnel + viz_decoder frameworks and privacy manifest present"

      - name: Package unsigned .ipa
        # An .ipa is just Payload/Runner.app zipped. -y keeps the framework
        # symlinks as symlinks instead of duplicating binaries.
        run: |
          mkdir -p build/ios/ipa-unsigned/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa-unsigned/Payload/
          cd build/ios/ipa-unsigned
          zip -qry "mstream_music-${{ github.ref_name }}-ios-unsigned.ipa" Payload

      - name: Attach unsigned .ipa to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: build/ios/ipa-unsigned/mstream_music-*-ios-unsigned.ipa
