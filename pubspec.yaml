name: mstream_music
description: A music streaming app for mStream Server

# The following line prevents the package from being accidentally published to
# pub.dev using `pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
version: 0.32.0+50

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  http: ^1.4.0
  uuid: ^4.5.1
  rxdart: ^0.28.0
  path_provider: ^2.1.5
  audio_session: ^0.2.2
  audio_service: ^0.18.18
  just_audio: ^0.10.3
  # Desktop playback backend: just_audio has no native Windows/Linux
  # implementation, so route it through media_kit (libmpv) on those platforms.
  # Initialized in main() for Windows/Linux only — Android/iOS/macOS keep
  # just_audio's native backend.
  just_audio_media_kit: ^2.0.6
  media_kit_libs_audio: ^1.0.4
  flutter_slidable: ^4.0.3
  background_downloader: ^9.4.4
  flutter_launcher_icons: ^0.14.2
  permission_handler: ^12.0.1
  url_launcher: ^6.3.1
  # QR scanning for iroh pairing codes (CameraX/ML Kit). Replaces the
  # long-removed flutter_barcode_scanner.
  mobile_scanner: ^7.2.0
  # Network-change signal that kicks the iroh tunnel's reconnect — iroh can't
  # self-detect interface changes (Wi-Fi<->cellular) on Android.
  connectivity_plus: ^7.2.0
  cupertino_icons: ^1.0.8
  path: any
  # Visualizer: FFI bindings to libprojectM (loaded from jniLibs on Android).
  ffi: ^2.1.4
  media_cast_dlna: ^0.3.1
  flutter_chrome_cast: ^1.4.6
  # Desktop Chromecast discovery (pure-Dart mDNS, works on Windows/Linux). The
  # CASTV2 control client is hand-rolled in lib/media/castv2/ (TLS + a tiny
  # CastMessage protobuf codec) so we control the audio LOAD content-type — the
  # off-the-shelf Dart cast libs are video-only. flutter_chrome_cast (native
  # Google SDK) stays for Android/iOS; desktop uses this behind the same
  # DeviceDiscoverer/PlaybackBackend seam.
  multicast_dns: ^0.3.2
  # Native share sheet for exporting diagnostic logs (Diagnostics screen).
  # Capped at 12.x: master moved to share_plus 13, which needs win32 ^6, but the
  # desktop launch_at_startup 0.5.1 dep pins win32_registry ^2 (win32 ^5) and has
  # no newer release — 13 can't co-resolve. 12.0.2 is the newest share_plus still
  # on win32 5, and its SharePlus.instance/ShareParams API is unchanged, so the
  # code is unaffected. Bump to 13 once launch_at_startup supports win32_registry 3.
  share_plus: ^12.0.0
  meta: any
  # Package name (applicationId) lookup so the album-art ContentProvider
  # authority always matches the manifest, regardless of --dart-define flags.
  # Capped at 9.x for the same win32-5 reason as share_plus above (10.x needs
  # win32 ^6, which the desktop launch_at_startup dep can't co-resolve). 9.0.1's
  # PackageInfo API is unchanged, so the code is unaffected.
  package_info_plus: ^9.0.0
  # LAN discovery of mStream servers (_mstream._tcp) for Quick Connect.
  # NsdManager/Bonjour under the hood; bonsoir manages its own multicast, so
  # no MulticastLock is needed; the manifest already declares
  # CHANGE_WIFI_MULTICAST_STATE (shared with DLNA discovery).
  bonsoir: ^7.1.4
  # In-repo Android WifiLock shim (the Wi-Fi half of ExoPlayer's
  # WAKE_MODE_NETWORK, which just_audio doesn't expose) — held while audio
  # actually streams so screen-off Wi-Fi power-save can't stall playback.
  wifi_lock_shim:
    path: packages/wifi_lock_shim
  # In-repo iOS packaging for the Rust iroh tunnel: a SwiftPM binaryTarget
  # that links/embeds the committed iroh_tunnel.xcframework into Runner
  # (built by rust/iroh_tunnel/build-ios.sh). Android is unchanged (jniLibs).
  iroh_tunnel_native:
    path: packages/iroh_tunnel_native
  # In-repo iOS packaging for the Rust visualizer audio sidecar: decodes the
  # playing track (file / HTTP Range) so the shader visualizer reacts to the
  # real audio instead of the synthesized signal. Same committed-xcframework
  # model (built by rust/viz_decoder/build-ios.sh).
  viz_decoder_native:
    path: packages/viz_decoder_native
dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

flutter_icons:
  android: true
  ios: true
  image_path_android: "graphics/icon/icon.png"
  image_path_ios: "graphics/icon/mstream.png"
  # The App Store rejects icons with an alpha channel.
  remove_alpha_ios: true

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:
  # Enables gen_l10n code generation from the ARB files in lib/l10n
  # (configured by l10n.yaml). Produces AppLocalizations on `flutter
  # pub get` / build.
  generate: true
  assets:
    - graphics/mstream-logo.png
    - graphics/default.png
    - assets/presets/
    - assets/shaders/
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Runtime GLSL fragment shaders (compiled by the Flutter build) — the
  # pure-Flutter shader visualizer presets (Shadertoy shaders ported to
  # Flutter's dialect), used on platforms without the native Android
  # visualizer (iOS; desktop uses the same module). See lib/visualizer/.
  shaders:
    - shaders/visualizer/01-spectrum-bars.frag
    - shaders/visualizer/02-audio-tunnel.frag
    - shaders/visualizer/03-plasma-pulse.frag
    - shaders/visualizer/04-cyber-fuji-buffera.frag
    - shaders/visualizer/04-cyber-fuji-image.frag
    - shaders/visualizer/05-hex-buffera.frag
    - shaders/visualizer/05-hex-bufferb.frag
    - shaders/visualizer/05-hex-bufferc.frag
    - shaders/visualizer/05-hex-image.frag
    - shaders/visualizer/06-4d-beats.frag
    - shaders/visualizer/07-neonwave-sunrise.frag
    - shaders/visualizer/08-neonwave-sunset.frag

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware.

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  fonts:
    - family: Jura
      fonts:
        - asset: fonts/Jura-Bold.ttf
          weight: 700