plugins {
    id "com.android.application"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    compileSdk = 36
    ndkVersion = "28.2.13676358"
    namespace "com.example.mstream_music"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
        test.java.srcDirs += 'src/test/kotlin'
    }

    testOptions {
        unitTests.returnDefaultValues = true
    }

    lintOptions {
        disable 'InvalidPackage'
    }

    defaultConfig {
        applicationId "mstream.music"
        // Raised from flutter.minSdkVersion to 26 (Android 8.0): the
        // media_cast_dlna plugin (DLNA casting) requires API 26+. This drops
        // support for Android 7.x and below.
        minSdk = 26
        targetSdk = 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
        // Visualizer + iroh: we only ship libprojectM-4.so / libiroh_tunnel.so for
        // these ABIs, so cap the app to the same set. armeabi-v7a (very old 32-bit
        // ARM) is dropped. abiFilters is set in both ndk (what Flutter ships) and
        // externalNativeBuild (what CMake compiles).
        //
        // BUT ndk.abiFilters cannot coexist with the splits.abi that Flutter
        // configures for `--split-per-abi` (AGP throws "Conflicting configuration").
        // So skip the ndk filter in that mode — a split build must instead pass
        // `--target-platform android-arm64,android-x64` to stay on these two ABIs
        // (otherwise it would emit a broken armeabi-v7a split with no native libs).
        // Non-split builds (universal APK, Play AAB) are unaffected.
        if (!((project.findProperty("split-per-abi") ?: "false").toString().toBoolean())) {
            ndk {
                abiFilters "arm64-v8a", "x86_64"
            }
        }
        externalNativeBuild {
            cmake {
                abiFilters "arm64-v8a", "x86_64"
            }
        }
    }

    // Two distributions from one codebase, both descending from applicationId
    // mstream.music:
    //   play — Google Play edition. Keeps the CANONICAL applicationId
    //          `mstream.music` — chosen before the first Play upload, since a
    //          Play package name is permanent and we don't want to be stuck on a
    //          `.play` suffix. No All-files-access (its source set adds no
    //          storage permission, so the merged manifest is clean).
    //   full — "mStream Plus" sideload / direct APK; applicationId
    //          `mstream.music.plus` so it coexists with the Play build. Keeps
    //          All-files-access (MANAGE_EXTERNAL_STORAGE lives in
    //          src/full/AndroidManifest.xml) for the Permanent / SD-card folders,
    //          plus self-signed TLS. (Gradle flavor stays named `full`; the
    //          source set src/full/ is unchanged — only the applicationId moved.)
    flavorDimensions "dist"
    productFlavors {
        play {
            dimension "dist"
        }
        full {
            dimension "dist"
            applicationIdSuffix ".plus"
            versionNameSuffix "-plus"
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "3.22.1"
        }
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
            // ExoPlayer/Media3 (used by just_audio) accesses methods reflectively
            // that R8 strips without explicit keep-rules. Disable minification
            // until proper proguard-rules.pro is added.
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source '../..'
}

// AGP 9 / built-in Kotlin: the kotlin-android plugin is removed from the
// plugins block above and the old android.kotlinOptions is replaced by this
// top-level kotlin.compilerOptions block (see Flutter "migrate to built-in
// Kotlin" guide). The Kotlin stdlib is now provided automatically, so the
// previous explicit kotlin-stdlib-jdk7 dependency is gone.
kotlin {
    compilerOptions {
        jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17
    }
}

dependencies {
    implementation 'androidx.multidex:multidex:2.0.1'
    // JVM unit tests for the hand-written MPEG-TS muxer (TsHlsSinkTest). Only
    // compiled/run by the test*UnitTest tasks, never bundled into the APK.
    testImplementation 'junit:junit:4.13.2'
}
